<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách vai trò - Cô Đào Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">

    <!-- Header Section -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>
            <i class="fa-solid fa-user-shield"></i> Quản lý vai trò
        </h2>
        <a href="/roles/add" class="btn btn-success">
            <i class="fa-solid fa-plus"></i> Thêm vai trò
        </a>
    </div>

    <!-- Main List Card -->
    <div class="card">
        <div class="card-header">
            Danh sách vai trò hệ thống
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Tên vai trò</th>
                            <th>Mô tả</th>
                            <th class="text-center pe-4" style="width: 15%;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="role : ${roles}">
                            <td class="ps-4" th:text="${role.roleId}">1</td>
                            <td class="fw-semibold text-secondary" th:text="${role.roleName}">ADMIN</td>
                            <td th:text="${role.description}">Quản trị viên</td>
                            <td class="text-center pe-4">
                                <a th:href="@{'/roles/delete/' + ${role.roleId}}" 
                                   class="btn btn-danger btn-sm" 
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa vai trò này?')">
                                    <i class="fa-solid fa-trash"></i> Xóa
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
