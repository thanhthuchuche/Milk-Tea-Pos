<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Quản lý thanh toán</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>
            <i class="fa-solid fa-credit-card"></i>
            Quản lý thanh toán
        </h2>

        <a href="/payments/add"
           class="btn btn-success">

            <i class="fa-solid fa-plus"></i>
            Thêm thanh toán

        </a>

    </div>

    <div class="card">

        <div class="card-header bg-primary text-white">

            Danh sách thanh toán

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Phương thức</th>
                    <th>Trạng thái</th>
                    <th>Ngày thanh toán</th>
                    <th>Hóa đơn</th>
                    <th>Thao tác</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="p : ${payments}">

                    <td th:text="${p.paymentId}"></td>

                    <td th:text="${p.paymentMethod}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:if="${p.paymentStatus == 'PAID'}">
                            PAID
                        </span>

                        <span class="badge bg-warning text-dark"
                              th:if="${p.paymentStatus == 'PENDING'}">
                            PENDING
                        </span>

                        <span class="badge bg-danger"
                              th:if="${p.paymentStatus == 'FAILED'}">
                            FAILED
                        </span>

                        <span class="badge bg-secondary"
                              th:if="${p.paymentStatus != 'PAID'
                              and p.paymentStatus != 'PENDING'
                              and p.paymentStatus != 'FAILED'}"
                              th:text="${p.paymentStatus}">
                        </span>

                    </td>

                    <td th:text="${p.paymentDate}"></td>

                    <td th:text="${p.invoice != null ? p.invoice.invoiceId : 'N/A'}"></td>

                    <td>

                        <a th:href="@{/payments/edit/{id}(id=${p.paymentId})}"
                           class="btn btn-warning btn-sm">

                            <i class="fa-solid fa-pen"></i>

                        </a>

                        <a th:href="@{/payments/delete/{id}(id=${p.paymentId})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Xóa thanh toán này?')">

                            <i class="fa-solid fa-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
