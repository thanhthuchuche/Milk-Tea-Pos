<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đơn hàng của tôi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 class="mb-4">
        Đơn hàng của tôi
    </h2>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>Mã đơn</th>

            <th>Ngày đặt</th>

            <th>Trạng thái</th>

            <th>Tổng tiền</th>

            <th>Chi tiết</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="order : ${orders}">

            <td th:text="${order.orderId}"></td>

            <td th:text="${order.orderDate}"></td>

            <td th:text="${order.status}"></td>

            <td th:text="${order.totalAmount}"></td>

            <td>

                <a class="btn btn-sm"
                   th:href="@{/my-orders/{id}(id=${order.orderId})}"
                   style="background-color:#8B5E3C; color:#fff; border-color:#8B5E3C;">
                    Xem
                </a>
                <a th:href="@{/customer-order/delete/{id}(id=${order.orderId})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc muốn xóa đơn hàng này?')">
                    Xóa
                </a>


            </td>

        </tr>

        </tbody>

    </table>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
