<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Quản lý hóa đơn</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>
            <i class="fa-solid fa-file-invoice-dollar"></i>
            Quản lý hóa đơn
        </h2>

        <a href="/invoices/add"
           class="btn btn-success">

            <i class="fa-solid fa-plus"></i>
            Thêm hóa đơn

        </a>

    </div>

    <div class="card">

        <div class="card-header bg-primary text-white">

            Danh sách hóa đơn

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Ngày hóa đơn</th>
                    <th>Tổng tiền</th>
                    <th>Đơn hàng</th>
                    <th>Chi tiết</th>
                    <th>Thao tác</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="i : ${invoices}">

                    <td th:text="${i.invoiceId}"></td>

                    <td th:text="${i.invoiceDate}"></td>

                    <td th:text="${i.totalAmount}"></td>

                    <td th:text="${i.orders != null ? i.orders.orderId : 'Không có'}"></td>

                    <td>

                        <a class="btn btn-primary btn-sm"
                           th:href="@{/invoice/{id}(id=${i.invoiceId})}">

                            Xem

                        </a>

                    </td>

                    <td>

                        <a th:href="@{/invoices/edit/{id}(id=${i.invoiceId})}"
                           class="btn btn-warning btn-sm">

                            <i class="fa-solid fa-pen"></i>

                        </a>

                        <a th:href="@{/invoices/delete/{id}(id=${i.invoiceId})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Xóa hóa đơn này?')">

                            <i class="fa-solid fa-trash"></i>

                        </a>

                    </td>


                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
