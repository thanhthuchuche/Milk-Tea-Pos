<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết đơn hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="mb-0">

            Chi tiết đơn hàng #
            <span th:text="${order.orderId}"></span>

        </h2>

        <a href="/customer/orders"
           class="btn"
           style="background-color:#8B5E3C; color:#fff;">

            <i class="fa-solid fa-arrow-left"></i>
            Quay lại

        </a>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>Tên món</th>

            <th>Số lượng</th>

            <th>Đơn giá</th>

            <th>Thành tiền</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="d : ${details}">

            <td th:text="${d.product.productName}"></td>

            <td th:text="${d.quantity}"></td>

            <td th:text="${d.price}"></td>

            <td th:text="${d.subtotal}"></td>

        </tr>

        </tbody>

    </table>

    <h3 class="text-danger">

        Tổng tiền:
        <span th:text="${order.totalAmount}"></span>

    </h3>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
