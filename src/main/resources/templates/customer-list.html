<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Quản lý khách hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>

            <i class="fa-solid fa-user"></i>

            Quản lý khách hàng

        </h2>

        <a href="/customers/add"
           class="btn btn-success">

            <i class="fa-solid fa-plus"></i>

            Thêm khách hàng

        </a>

    </div>

    <form action="/customers/search"
          method="get"
          class="row mb-3">

        <div class="col-md-4">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Nhập tên khách hàng">

        </div>

        <div class="col-md-2">

            <button class="btn btn-primary">

                <i class="fa-solid fa-magnifying-glass"></i>

                Tìm kiếm

            </button>

        </div>

    </form>

    <div class="card">

        <div class="card-header bg-primary text-white">

            Danh sách khách hàng

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Tên khách hàng</th>

                    <th>SĐT</th>

                    <th>Email</th>

                    <th>Điểm</th>

                    <th>Hành động</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="customer : ${customers}">

                    <td th:text="${customer.customerId}"></td>

                    <td th:text="${customer.fullName}"></td>

                    <td th:text="${customer.phone}"></td>

                    <td th:text="${customer.email}"></td>

                    <td th:text="${customer.point}"></td>

                    <td>

                        <a th:href="@{'/customers/edit/' + ${customer.customerId}}"
                           class="btn btn-warning btn-sm">

                            <i class="fa-solid fa-pen"></i>

                        </a>

                        <a th:href="@{'/customers/delete/' + ${customer.customerId}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Xóa khách hàng này?')">

                            <i class="fa-solid fa-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
