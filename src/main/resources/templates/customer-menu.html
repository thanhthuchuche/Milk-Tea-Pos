<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt món</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <style>
        html{
            scroll-behavior:smooth;
        }

        .category-bar{
            position: sticky;
            top:0;
            z-index:1000;
            background:white;
            padding:15px 0;
        }

        .category-btn{
            border-radius:30px;
            white-space:nowrap;
        }
    </style>

</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>
            Menu Cô Đào Quán
        </h2>
        <div class="alert alert-success text-center"
             th:if="${successMessage}"
             id="successPopup">

            Đã thêm
            <span th:text="${successMessage}"></span>
            vào giỏ hàng

        </div>

        <a href="/customer-cart"
           class="btn text-white"
           style="background-color:#8B5E3C">

            <i class="bi bi-cart3"></i>
            Giỏ hàng của tôi

        </a>

    </div>

    <!-- tìm kiếm -->
    <div class="row mb-4">
        <div class="col-md-6 mx-auto">

            <input type="text"
                   id="searchInput"
                   class="form-control form-control-lg"
                   placeholder="🔍 Tìm món...">

        </div>
    </div>

    <!-- thanh danh mục -->
    <div class="category-bar mb-4">

        <div class="d-flex gap-3 overflow-auto justify-content-center">

            <a class="btn category-btn"
               style="background:#F5F1EA;color:#8B5E3C;border:1px solid #8B5E3C;"
               th:each="c : ${categories}"
               th:href="'#category-'+${c.categoryId}"
               th:text="${c.categoryName}">
            </a>

        </div>

    </div>

    <!-- sản phẩm theo danh mục -->
    <div th:each="category : ${categories}">

        <h3 class="mt-5 mb-4 fw-bold"
            style="color:#8B5E3C"
            th:id="'category-'+${category.categoryId}"
            th:text="${category.categoryName}">
        </h3>

        <div class="row">

            <div class="col-lg-3 col-md-4 col-sm-6 mb-4 product-card"
                 th:each="product : ${@productService.getProductsByCategory(category.categoryId)}">

                <div class="card shadow border-0"
                     style="border-radius:20px">

                    <img th:src="@{/images/{img}(img=${product.image})}"
                         class="card-img-top"
                         style="
                         height:170px;
                         object-fit:contain;
                         background:white;
                         padding:10px;">

                    <div class="card-body text-center">

                        <h5 class="fw-bold product-name"
                            th:text="${product.productName}">
                        </h5>

                        <h4 class="text-danger fw-bold"
                            th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')}+' đ'">
                        </h4>

                        <div class="mt-3">

                            <a class="btn text-white"
                               style="background-color:#8B5E3C"
                               th:href="@{/customer-cart/add/{customerId}/{productId}
                               (customerId=1,
                               productId=${product.productId})}">

                                Thêm vào giỏ

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function () {

        let keyword = this.value.toLowerCase();

        let cards = document.querySelectorAll(".product-card");

        cards.forEach(card => {

            let name = card.querySelector(".product-name")
                .innerText.toLowerCase();

            if (name.includes(keyword)) {
                card.style.display = "";
            }
            else {
                card.style.display = "none";
            }

        });

    });

</script>
<script>

    setTimeout(function(){

        let popup =
            document.getElementById(
                "successPopup");

        if(popup){

            popup.style.display = "none";

        }

    },2000);

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
