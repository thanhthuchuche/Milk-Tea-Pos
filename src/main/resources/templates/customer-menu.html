<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt món - Cô Đào Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        html {
            scroll-behavior: smooth;
        }
        /* Sticky Category Navigation Bar */
        .category-bar {
            position: sticky;
            top: 70px;
            z-index: 999;
            background: rgba(250, 246, 240, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1.5px solid var(--border-color);
            padding: 0.8rem 0;
            box-shadow: 0 4px 10px rgba(111, 78, 55, 0.03);
        }
        .category-pills::-webkit-scrollbar {
            display: none;
        }
        .category-pills {
            -ms-overflow-style: none;
            scrollbar-width: none;
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding: 0.1rem 0;
        }
        .category-btn {
            border: 1px solid var(--border-color) !important;
            color: var(--primary-dark) !important;
            background: var(--bg-white) !important;
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 30px;
            padding: 0.5rem 1.25rem;
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
        }
        .category-btn:hover, .category-btn.active {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
            color: #ffffff !important;
            transform: translateY(-1px);
        }
        /* Toast Notification Styling */
        .notification-toast {
            position: fixed;
            top: 90px;
            right: 25px;
            z-index: 1050;
            background: var(--primary-dark);
            color: #ffffff;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-left: 5px solid var(--secondary-color);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .notification-toast.show {
            transform: translateX(0);
        }
        /* Search Box Design */
        .search-box-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }
        .search-box-container input {
            border-radius: 30px;
            padding: 0.8rem 1.5rem 0.8rem 3rem;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid var(--border-color);
        }
        .search-box-container i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .product-image-container {
            width: 100%;
            height: 180px;
            position: relative;
            background: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }
        .product-card:hover .product-image-container img {
            transform: scale(1.06);
        }
        .category-section-title {
            position: relative;
            padding-left: 1rem;
            color: var(--primary-dark);
            font-weight: 800;
        }
        .category-section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 5px;
            background: var(--primary-color);
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<!-- Success Notification Toast -->
<div th:if="${successMessage}" class="notification-toast shadow-lg" id="successToast">
    <i class="fa-solid fa-circle-check text-warning fa-lg"></i>
    <div>
        <strong class="d-block text-white small">Giỏ hàng cập nhật</strong>
        <span class="small opacity-90" th:text="'Đã thêm ' + ${successMessage} + ' vào giỏ hàng'">Đã thêm món</span>
    </div>
</div>

<div class="container py-4">

    <!-- Header Block -->
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mb-4 gap-3">
        <h2 class="mb-0">
            <i class="fa-solid fa-mug-hot text-primary"></i> Menu Cô Đào Quán
        </h2>
        <a href="/customer-cart" class="btn btn-primary btn-lg shadow-sm">
            <i class="bi bi-cart3"></i> Giỏ hàng của tôi
        </a>
    </div>

    <!-- Search box -->
    <div class="mb-4">
        <div class="search-box-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" class="form-control" placeholder="Tìm kiếm nước uống, toppings...">
        </div>
    </div>

    <!-- Category selector bar -->
    <div class="category-bar mb-4">
        <div class="container-fluid">
            <div class="category-pills justify-content-center">
                <a class="btn category-btn" 
                   th:each="c : ${categories}" 
                   th:href="'#category-' + ${c.categoryId}" 
                   th:text="${c.categoryName}">Danh mục</a>
            </div>
        </div>
    </div>

    <!-- Products grid catalog -->
    <div th:each="category : ${categories}" class="mb-5">
        <h4 class="mt-4 mb-4 category-section-title" 
            th:id="'category-' + ${category.categoryId}" 
            th:text="${category.categoryName}">Tên Danh Mục</h4>

        <div class="row g-4">
            <div class="col-xl-3 col-lg-4 col-sm-6 mb-2 product-card" 
                 th:each="product : ${@productService.getProductsByCategory(category.categoryId)}">
                <div class="card h-100">
                    <div class="product-image-container p-2">
                        <img th:src="${product.image != null and #strings.startsWith(product.image, 'http') ? product.image : '/images/' + product.image}" 
                             class="card-img-top rounded-4" 
                             alt="Hình sản phẩm">
                    </div>
                    <div class="card-body d-flex flex-column text-center p-3">
                        <h5 class="fw-bold product-name mb-2 text-truncate" th:text="${product.productName}">Tên sản phẩm</h5>
                        <p class="text-muted small text-truncate-2 mb-3" style="min-height: 40px;" th:text="${product.description}">Mô tả</p>
                        
                        <div class="mt-auto">
                            <h5 class="text-danger fw-bold mb-3" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h5>
                            <a class="btn btn-outline-primary w-100 py-2" 
                               th:href="@{/customer-cart/add/{customerId}/{productId}(customerId=1, productId=${product.productId})}">
                                <i class="fa-solid fa-cart-plus"></i> Thêm vào giỏ
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Search function logic
    const searchInput = document.getElementById("searchInput");
    searchInput.addEventListener("keyup", function () {
        const keyword = this.value.toLowerCase();
        const cards = document.querySelectorAll(".product-card");
        cards.forEach(card => {
            const name = card.querySelector(".product-name").innerText.toLowerCase();
            const desc = card.querySelector(".text-muted").innerText.toLowerCase();
            if (name.includes(keyword) || desc.includes(keyword)) {
                card.style.display = "";
            } else {
                card.style.display = "none";
            }
        });
    });

    // Toast show animation and auto hide
    window.addEventListener("DOMContentLoaded", () => {
        const toast = document.getElementById("successToast");
        if (toast) {
            setTimeout(() => {
                toast.classList.add("show");
            }, 100);
            
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }
    });

    // Auto active category button on click/scroll
    const categoryBtns = document.querySelectorAll(".category-btn");
    categoryBtns.forEach(btn => {
        btn.addEventListener("click", function() {
            categoryBtns.forEach(b => b.classList.remove("active"));
            this.classList.add("active");
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
