<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thông tin giao dịch kho - Cô Đào Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header">
                    <h4 class="mb-0 text-dark">
                        <i class="fa-solid fa-truck-ramp-box"></i> Chi tiết giao dịch kho
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/transactions/save}" th:object="${transaction}" method="post">
                        <input type="hidden" th:field="*{transactionId}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Ngày giao dịch</label>
                                <input type="date" th:field="*{transactionDate}" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nguyên liệu</label>
                                <select th:field="*{ingredient}" class="form-select" required>
                                    <option th:each="i : ${ingredients}" 
                                            th:value="${i.ingredientId}" 
                                            th:text="${i.ingredientName}">Nguyên liệu</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Số lượng</label>
                                <input type="number" th:field="*{quantity}" class="form-control" placeholder="Nhập số lượng thực tế..." required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Loại giao dịch</label>
                                <select th:field="*{transactionType}" class="form-select" required>
                                    <option value="IMPORT">IMPORT (Nhập kho)</option>
                                    <option value="EXPORT">EXPORT (Xuất kho)</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Nhà cung cấp / Đối tác</label>
                                <input type="text" th:field="*{supplier}" class="form-control" placeholder="Tên nhà cung cấp hoặc người xuất/nhập hàng...">
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Ghi chú thêm</label>
                                <input type="text" th:field="*{note}" class="form-control" placeholder="Nhập ghi chú chi tiết nếu có...">
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-between">
                            <a href="/transactions" class="btn btn-secondary">
                                <i class="fa-solid fa-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-floppy-disk"></i> Lưu giao dịch
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
