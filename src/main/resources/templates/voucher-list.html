<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Quản lý Voucher</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>
            <i class="fa-solid fa-ticket"></i>
            Quản lý Voucher
        </h2>

        <a href="/vouchers/add"
           class="btn btn-success">

            <i class="fa-solid fa-plus"></i>
            Thêm Voucher

        </a>

    </div>

    <div class="card">

        <div class="card-header bg-primary text-white">

            Danh sách Voucher

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Mã Voucher</th>
                    <th>Giảm giá (%)</th>
                    <th>Thao tác</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="voucher : ${vouchers}">

                    <td th:text="${voucher.voucherId}"></td>

                    <td>
                        <span class="badge bg-primary"
                              th:text="${voucher.voucherCode}">
                        </span>
                    </td>

                    <td>
                        <span class="badge bg-success"
                              th:text="${voucher.discountPercent + '%'}">
                        </span>
                    </td>

                    <td>

                        <a th:href="@{/vouchers/edit/{id}(id=${voucher.voucherId})}"
                           class="btn btn-warning btn-sm">

                            <i class="fa-solid fa-pen"></i>

                        </a>

                        <a th:href="@{/vouchers/delete/{id}(id=${voucher.voucherId})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn có chắc muốn xóa không?')">

                            <i class="fa-solid fa-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
