<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giao dịch kho - Cô Đào Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">

    <!-- Header Section -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>
            <i class="fa-solid fa-clock-rotate-left"></i> Lịch sử giao dịch kho
        </h2>
        <a href="/transactions/add" class="btn btn-success">
            <i class="fa-solid fa-plus"></i> Thêm giao dịch
        </a>
    </div>

    <!-- Main List Card -->
    <div class="card">
        <div class="card-header">
            Chi tiết lịch sử xuất/nhập nguyên liệu
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Ngày giao dịch</th>
                            <th>Nguyên liệu</th>
                            <th class="text-end">Số lượng</th>
                            <th class="text-center">Loại</th>
                            <th>Nhà cung cấp</th>
                            <th>Ghi chú</th>
                            <th class="text-center pe-4" style="width: 15%;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="t : ${transactions}">
                            <td class="ps-4" th:text="${t.transactionId}">1</td>
                            <td th:text="${t.transactionDate}">Date</td>
                            <td class="fw-semibold text-secondary" th:text="${t.ingredient.ingredientName}">Sữa tươi</td>
                            <td class="text-end fw-bold" th:text="${t.quantity}">0</td>
                            <td class="text-center">
                                <span class="badge bg-success" th:if="${t.transactionType == 'IMPORT' || t.transactionType == 'Nhập' || t.transactionType == 'NHẬP'}">NHẬP KHO</span>
                                <span class="badge bg-danger" th:if="${t.transactionType == 'EXPORT' || t.transactionType == 'Xuất' || t.transactionType == 'XUẤT'}">XUẤT KHO</span>
                                <span class="badge bg-secondary" th:if="${t.transactionType != 'IMPORT' && t.transactionType != 'EXPORT' && t.transactionType != 'Nhập' && t.transactionType != 'Xuất' && t.transactionType != 'NHẬP' && t.transactionType != 'XUẤT'}" th:text="${t.transactionType}">Khác</span>
                            </td>
                            <td th:text="${t.supplier}">Supplier</td>
                            <td th:text="${t.note}">Note</td>
                            <td class="text-center pe-4">
                                <a th:href="@{/transactions/edit/{id}(id=${t.transactionId})}" class="btn btn-warning btn-sm">
                                    <i class="fa-solid fa-pen"></i>
                                </a>
                                <a th:href="@{/transactions/delete/{id}(id=${t.transactionId})}" 
                                   class="btn btn-danger btn-sm" 
                                   onclick="return confirm('Xóa giao dịch này?')">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
