<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý nguyên liệu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>
            <i class="fa-solid fa-boxes-stacked"></i>
            Quản lý nguyên liệu
        </h2>

        <a href="/ingredients/add"
           class="btn btn-success">

            <i class="fa-solid fa-plus"></i>
            Thêm nguyên liệu

        </a>

    </div>

    <div class="card">

        <div class="card-header bg-primary text-white">

            Danh sách nguyên liệu

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Tên nguyên liệu</th>

                    <th>Số lượng tồn</th>

                    <th>Đơn vị</th>

                    <th>Hành động</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="ingredient : ${ingredients}">

                    <td th:text="${ingredient.ingredientId}"></td>

                    <td th:text="${ingredient.ingredientName}"></td>

                    <td th:text="${ingredient.quantity}"></td>

                    <td th:text="${ingredient.unit}"></td>

                    <td>

                        <a th:href="@{'/ingredients/edit/' + ${ingredient.ingredientId}}"
                           class="btn btn-warning btn-sm">

                            <i class="fa-solid fa-pen"></i>

                        </a>

                        <a th:href="@{'/ingredients/delete/' + ${ingredient.ingredientId}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Xóa nguyên liệu này?')">

                            <i class="fa-solid fa-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
