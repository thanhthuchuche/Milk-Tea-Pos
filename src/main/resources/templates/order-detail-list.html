<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Chi tiết đơn hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2>

        Chi tiết đơn hàng #
        <span th:text="${orderId}"></span>

    </h2>
    <div class="mb-3">

        <a class="btn"
           style="background-color:#8B5E3C; color:white;"
           th:href="@{/orders}">

            ← Quay lại

        </a>

    </div>

    <div class="card mt-3">

        <div class="card-header"
             style="background-color:#8B5E3C; color:#fff;">
            Danh sách sản phẩm
        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <thead class="table-dark">

                <tr>

                    <th>Sản phẩm</th>

                    <th>Số lượng</th>

                    <th>Đơn giá</th>

                    <th>Thành tiền</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="detail : ${orderDetails}">

                    <td th:text="${detail.product.productName}"></td>

                    <td th:text="${detail.quantity}"></td>

                    <td th:text="${detail.price}"></td>

                    <td th:text="${detail.subtotal}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
