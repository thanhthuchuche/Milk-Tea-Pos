<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ hàng - Cô Đào Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .cart-qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-size: 0.8rem;
            transition: var(--transition-smooth);
        }
        .cart-qty-btn:hover {
            transform: scale(1.08);
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-5">

    <!-- Header Section -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">
            <i class="fa-solid fa-cart-shopping text-primary"></i> Giỏ hàng của tôi
        </h2>
        <a href="/customer/menu" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left"></i> Tiếp tục chọn món
        </a>
    </div>

    <!-- Active Cart Items Container -->
    <div th:if="${order != null}" class="row g-4">
        <!-- Cart Items List (Left Column) -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header">
                    Danh sách món đã chọn
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive border-0 shadow-none rounded-0">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4">Tên món</th>
                                    <th class="text-center">Số lượng</th>
                                    <th class="text-end">Đơn giá</th>
                                    <th class="text-end pe-4">Thành tiền</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="d : ${details}">
                                    <!-- Product Name -->
                                    <td class="ps-4 fw-semibold text-secondary" th:text="${d.product.productName}">Món ăn</td>
                                    
                                    <!-- Quantity Selector Controls -->
                                    <td class="text-center">
                                        <div class="d-flex align-items-center justify-content-center gap-2">
                                            <a class="cart-qty-btn btn btn-outline-danger" 
                                               th:href="@{/customer-cart/decrease/{id}(id=${d.detailId})}">
                                                <i class="fa-solid fa-minus"></i>
                                            </a>
                                            <span class="mx-2 fw-bold text-dark" th:text="${d.quantity}">1</span>
                                            <a class="cart-qty-btn btn btn-outline-success" 
                                               th:href="@{/customer-cart/increase/{id}(id=${d.detailId})}">
                                                <i class="fa-solid fa-plus"></i>
                                            </a>
                                        </div>
                                    </td>
                                    
                                    <!-- Price -->
                                    <td class="text-end text-muted" th:text="${#numbers.formatDecimal(d.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                                    
                                    <!-- Subtotal -->
                                    <td class="text-end fw-bold text-primary pe-4" th:text="${#numbers.formatDecimal(d.subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Checkout Summary (Right Column) -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header">
                    Tóm tắt đơn hàng
                </div>
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Tổng lượng món</span>
                        <strong class="text-dark" th:text="${details.size()} + ' loại món'">0</strong>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fw-bold text-dark fs-5">Tổng cộng</span>
                        <span class="text-danger fw-bold fs-4" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</span>
                    </div>
                    <a href="/customer-order/checkout" class="btn btn-primary w-100 py-3 fs-6">
                        <i class="fa-solid fa-circle-check"></i> Đặt hàng ngay
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty Cart Fallback State -->
    <div th:if="${order == null}" class="text-center py-5">
        <div class="mb-4 text-muted opacity-30">
            <i class="fa-solid fa-bag-shopping fa-5x"></i>
        </div>
        <h4 class="text-secondary fw-semibold">Giỏ hàng của bạn đang trống</h4>
        <p class="text-muted mb-4">Hãy lướt qua menu của chúng tôi để chọn những món uống thơm ngon nhất nhé.</p>
        <a href="/customer/menu" class="btn btn-primary btn-lg px-5 py-2.5">
            <i class="fa-solid fa-mug-hot"></i> Xem Thực Đơn
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
