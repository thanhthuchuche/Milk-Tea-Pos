<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Giỏ hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="mb-0">
            Giỏ hàng của tôi
        </h2>

        <a href="/customer/menu"
           class="btn"
           style="background-color:#8B5E3C; color:#fff;">

            <i class="fa-solid fa-arrow-left"></i>
            Quay lại menu

        </a>

    </div>

    <div th:if="${order!=null}">

        <table class="table table-bordered">

            <thead class="table-dark">

            <tr>

                <th>Tên món</th>

                <th>Số lượng</th>

                <th>Giá</th>

                <th>Thành tiền</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="d : ${details}">

                <td th:text="${d.product.productName}">
                </td>

                <td>

                    <a class="btn btn-outline-danger btn-sm"
                       th:href="@{/customer-cart/decrease/{id}(id=${d.detailId})}">
                        -
                    </a>

                    <span class="mx-3"
                          th:text="${d.quantity}">
    </span>

                    <a class="btn btn-outline-success btn-sm"
                       th:href="@{/customer-cart/increase/{id}(id=${d.detailId})}">
                        +
                    </a>

                </td>

                <td th:text="${d.price}">
                </td>

                <td th:text="${d.subtotal}">
                </td>

            </tr>

            </tbody>

        </table>
        <div class="text-end mt-4">

            <h3 class="text-danger">

                Tổng cộng:

                <span th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')}">
        </span>

                đ

            </h3>

        </div>
        <div class="text-end mt-3">

            <a class="btn btn-lg"
               href="/customer-order/checkout"
               style="background-color:#8B5E3C; color:#fff; border-color:#8B5E3C;">
                Đặt hàng
            </a>

        </div>

    </div>

    <div th:if="${order==null}">

        <div class="alert alert-warning">

            Giỏ hàng đang trống

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
