<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Menu Cô Đào Quán</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
    <style>

        html{
            scroll-behavior:smooth;
        }

    </style>
    <style>

        .category-bar{
            position: sticky;
            top: 0;
            z-index: 1000;
            background: white;
            padding: 15px 0;
        }

        .category-btn{
            border-radius: 30px;
            white-space: nowrap;
        }

    </style>
</head>
<body>

<div class="container mt-4">

    <!-- Tiêu đề -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <a href="/tables"
           class="btn text-white"
           style="background-color:#8B5E3C">

            <i class="fa-solid fa-arrow-left"></i>
            Quay lại

        </a>

        <h2 class="mb-0">
            Menu bàn
            <span th:text="${table.tableNumber}"></span>
        </h2>

        <div style="width:100px"></div>

    </div>
    <div class="alert alert-success text-center"
         th:if="${successMessage}"
         id="successPopup">

        <span th:text="${successMessage}"></span>

    </div>
    <!-- Thanh danh mục -->

    <div class="category-bar mb-4">

        <div class="d-flex gap-3 overflow-auto justify-content-center">

            <a class="btn category-btn"
               style="
background:#F5F1EA;color:#8B5E3C;border:1px solid #8B5E3C;"
               th:each="c : ${categories}"
               th:href="'#category-'+${c.categoryId}"
               th:text="${c.categoryName}">
            </a>

        </div>

    </div>

    <!-- Tìm kiếm -->
    <div class="row mb-4">
        <div class="col-md-6 mx-auto">
            <input type="text"
                   id="searchInput"
                   class="form-control form-control-lg"
                   placeholder="🔍 Tìm món...">
        </div>
    </div>

    <!-- Xem đơn hàng -->
    <div class="text-center mb-4">
        <a class="btn text-white"
           style="background-color:#8B5E3C"
           th:href="@{/table-order/{id}(id=${table.tableId})}">
            Xem đơn hàng
        </a>
    </div>

    <!-- Danh sách sản phẩm -->
    <div th:each="category : ${categories}">

        <h3 class="mt-5 mb-4 fw-bold"
            style="color:#8B5E3C"
            th:id="'category-'+${category.categoryId}"
            th:text="${category.categoryName}">
        </h3>

        <div class="row">

            <div class="col-lg-3 col-md-4 col-sm-6 mb-4 product-card"
                 th:each="product : ${@productService.getProductsByCategory(category.categoryId)}">

                <div class="card shadow border-0"
                     style="border-radius:20px;">

                    <img th:src="@{/images/{img}(img=${product.image})}"
                         class="card-img-top"
                         style="
                     height:170px;
                     object-fit:contain;
                     background:white;
                     padding:10px;">

                    <div class="card-body text-center">

                        <h5 class="fw-bold product-name"
                            th:text="${product.productName}">
                        </h5>

                        <h4 class="text-danger fw-bold"
                            th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')}+' đ'">
                        </h4>

                        <div class="d-flex justify-content-center align-items-center mt-3">

                            <a class="btn btn-outline-danger rounded-circle"
                               style="width:45px;height:45px;font-size:20px;"
                               th:href="@{/decrease-order/{tableId}/{productId}
                           (tableId=${table.tableId},
                           productId=${product.productId})}">
                                -
                            </a>

                            <span class="mx-3 fw-bold fs-4"
                                  th:text="${@orderQRService.getQuantity(
                              table.tableId,
                              product.productId)}">
                        </span>

                            <a class="btn btn-outline-success rounded-circle"
                               style="width:45px;height:45px;font-size:20px;"
                               th:href="@{/order-at-table/{tableId}/{productId}
                           (tableId=${table.tableId},
                           productId=${product.productId})}">
                                +
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function () {

        let keyword = this.value.toLowerCase();

        let cards = document.querySelectorAll(".product-card");

        cards.forEach(card => {

            let name = card.querySelector(".product-name")
                .innerText.toLowerCase();

            if (name.includes(keyword)) {
                card.style.display = "";
            } else {
                card.style.display = "none";
            }

        });

    });

</script>
<script>

    setTimeout(function(){

        let popup =
            document.getElementById(
                "successPopup");

        if(popup){

            popup.style.display="none";

        }

    },2000);

</script>
<script>
    setTimeout(function () {

        let popup = document.getElementById("successPopup");

        if (popup) {
            popup.style.display = "none";
        }

    }, 2000);
</script>
</body>
</html>
