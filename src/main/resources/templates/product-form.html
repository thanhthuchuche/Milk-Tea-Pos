<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Thông tin sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

</head>

<body style="background-color:#f8f9fa;">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header text-white"
                     style="background-color:#8B5E3C;">

                    <h4 class="mb-0">

                        <i class="fa-solid fa-mug-hot"></i>

                        Thông tin sản phẩm

                    </h4>

                </div>

                <div class="card-body">

                    <form th:action="@{/products/save}"
                          th:object="${product}"
                          method="post"
                          enctype="multipart/form-data">

                        <input type="hidden"
                               th:field="*{productId}">

                        <div class="mb-3">

                            <label class="form-label fw-bold">

                                Tên sản phẩm

                            </label>

                            <input type="text"
                                   th:field="*{productName}"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">

                                Giá bán

                            </label>

                            <input type="number"
                                   th:field="*{price}"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">

                                Hình ảnh sản phẩm (Link URL hoặc Tải lên)

                            </label>

                            <input type="text"
                                   th:field="*{image}"
                                   class="form-control mb-2"
                                   placeholder="Nhập đường dẫn hình ảnh (URL)...">

                            <input type="file"
                                   name="imageFile"
                                   class="form-control">

                            <div class="form-text">
                                Nhập link ảnh trực tiếp từ internet hoặc tải tệp lên từ máy tính.
                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">

                                Mô tả

                            </label>

                            <textarea
                                    th:field="*{description}"
                                    class="form-control"
                                    rows="3"></textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">

                                Trạng thái

                            </label>

                            <select th:field="*{status}"
                                    class="form-select">

                                <option value="ACTIVE">
                                    Đang bán
                                </option>

                                <option value="INACTIVE">
                                    Ngừng bán
                                </option>

                            </select>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-bold">

                                Danh mục

                            </label>

                            <select name="categoryId"
                                    class="form-select">

                                <option th:each="c : ${categories}"
                                        th:value="${c.categoryId}"
                                        th:text="${c.categoryName}"
                                        th:selected="${product.category != null and c.categoryId == product.category.categoryId}">
                                </option>

                            </select>

                        </div>

                        <hr>

                        <div class="d-flex justify-content-between">

                            <a href="/products"
                               class="btn btn-secondary">

                                <i class="fa-solid fa-arrow-left"></i>

                                Quay lại

                            </a>

                            <button type="submit"
                                    class="btn text-white"
                                    style="background-color:#8B5E3C;">

                                <i class="fa-solid fa-floppy-disk"></i>

                                Lưu sản phẩm

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
