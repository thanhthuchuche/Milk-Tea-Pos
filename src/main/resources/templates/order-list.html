<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Quản lý đơn hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>
            <i class="fa-solid fa-cart-shopping"></i>
            Quản lý đơn hàng
        </h2>

        <a href="/orders/add"
           class="btn btn-success">

            <i class="fa-solid fa-plus"></i>
            Tạo đơn hàng

        </a>

    </div>
    <form action="/orders/search"
          method="get"
          class="row mb-4">

        <div class="col-md-4">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Nhập tên khách hàng">

        </div>

        <div class="col-md-2">

            <button class="btn btn-primary">

                <i class="fa-solid fa-magnifying-glass"></i>
                Tìm kiếm

            </button>

        </div>

    </form>

    <div class="card">

        <div class="card-header bg-primary text-white">

            Danh sách đơn hàng

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Khách hàng</th>
                    <th>Bàn</th>
                    <th>Nhân viên</th>
                    <th>Ngày đặt</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="order : ${orders}">

                    <td th:text="${order.orderId}"></td>

                    <td th:text="${order.customer != null ?
                                   order.customer.fullName :
                                   'Khách lẻ'}">
                    </td>
                    <td th:text="${order.tableCafe != null ? order.tableCafe.tableNumber : ''}"></td>

                    <td th:text="${order.user != null ?
                                  order.user.fullName :
                                  'Khách tự gọi'}">
                    </td>

                    <td th:text="${order.orderDate}"></td>

                    <td th:text="${order.totalAmount}"></td>

                    <td>

                        <span class="badge bg-warning text-dark"
                              th:if="${order.status == 'PENDING'}">
                            PENDING
                        </span>

                        <span class="badge bg-success"
                              th:if="${order.status == 'COMPLETED'}">
                            COMPLETED
                        </span>

                        <span class="badge bg-danger"
                              th:if="${order.status == 'CANCELLED'}">
                            CANCELLED
                        </span>

                        <span class="badge bg-secondary"
                              th:if="${order.status != 'PENDING'
                              and order.status != 'COMPLETED'
                              and order.status != 'CANCELLED'}"
                              th:text="${order.status}">
                        </span>

                    </td>

                    <td>

                        <a class="btn btn-info btn-sm"
                           th:href="@{/orders/detail/{id}(id=${order.orderId})}">

                            <i class="fa-solid fa-eye"></i>

                        </a>

                        <a th:href="@{/orders/delete/{id}(id=${order.orderId})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn có chắc muốn xóa không?')">

                            <i class="fa-solid fa-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
