<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đơn hàng Online - Cô Đào Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">

    <!-- Header Section -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>
            <i class="fa-solid fa-globe text-primary"></i> Quản lý đơn hàng Online
        </h2>
    </div>

    <!-- Main List Card -->
    <div class="card">
        <div class="card-header">
            Danh sách đơn hàng đặt qua Website / Mobile của khách hàng
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead>
                        <tr>
                            <th class="ps-4">Mã đơn</th>
                            <th>Khách hàng</th>
                            <th>Ngày đặt</th>
                            <th class="text-end">Tổng tiền</th>
                            <th class="text-center">Trạng thái</th>
                            <th class="text-center pe-4" style="width: 25%;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="o : ${orders}">
                            <td class="ps-4 fw-bold text-primary" th:text="'#' + ${o.orderId}">#1</td>
                            <td class="fw-semibold text-secondary" th:text="${o.customer.fullName}">Tên Khách Hàng</td>
                            <td th:text="${#dates.format(o.orderDate, 'dd-MM-yyyy HH:mm')}">Ngày đặt</td>
                            <td class="text-end fw-bold text-danger" th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                            <td class="text-center">
                                <span class="badge bg-warning" th:if="${o.status == 'PENDING'}">CHỜ DUYỆT</span>
                                <span class="badge bg-success" th:if="${o.status == 'COMPLETED'}">ĐÃ DUYỆT / ĐÃ BÁN</span>
                                <span class="badge bg-danger" th:if="${o.status == 'CANCELLED'}">ĐÃ HỦY</span>
                            </td>
                            <td class="text-center pe-4">
                                <a th:href="@{/admin/customer-orders/detail/{id}(id=${o.orderId})}" class="btn btn-secondary btn-sm">
                                    <i class="fa-solid fa-eye"></i> Xem chi tiết
                                </a>
                                
                                <a th:if="${o.status == 'PENDING'}" 
                                   th:href="@{/admin/customer-orders/approve/{id}(id=${o.orderId})}" 
                                   class="btn btn-success btn-sm"
                                   onclick="return confirm('Duyệt đơn hàng và xuất hóa đơn này?')">
                                    <i class="fa-solid fa-check"></i> Duyệt đơn
                                </a>
                                
                                <a th:if="${o.status == 'PENDING'}" 
                                   th:href="@{/admin/customer-orders/cancel/{id}(id=${o.orderId})}" 
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Bạn có chắc chắn muốn hủy đơn hàng này?')">
                                    <i class="fa-solid fa-xmark"></i> Hủy
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
