<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ghi chú món ăn - Cô Đào Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header text-white">
                    <h4 class="mb-0 text-dark">
                        <i class="fa-solid fa-edit"></i> Chỉnh sửa ghi chú món đặt
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/save-note}" method="post">
                        <input type="hidden" name="detailId" th:value="${detail.orderDetailId}">

                        <div class="mb-4">
                            <label class="form-label fw-bold">Nội dung ghi chú yêu cầu (Ví dụ: Không đường, ít đá, thêm trân châu...)</label>
                            <textarea name="note" class="form-control" rows="5" placeholder="Nhập yêu cầu pha chế của khách hàng..." th:text="${detail.note}"></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/table-order/{id}(id=${detail.orders.tableCafe.tableId})}" class="btn btn-secondary">Hủy</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-check"></i> Lưu ghi chú
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
