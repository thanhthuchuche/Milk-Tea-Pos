<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Quản lý bàn</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="alert alert-success alert-dismissible fade show"
         th:if="${param.success}">

        Thanh toán thành công!

        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert">
        </button>

    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>

            <i class="fa-solid fa-table"></i>

            Quản lý bàn

        </h2>

        <a href="/tables/add"
           class="btn btn-success">

            <i class="fa-solid fa-plus"></i>

            Thêm bàn

        </a>

    </div>

    <div class="card shadow">

        <div class="card-header text-white"
             style="background-color:#8B5E3C">

            Danh sách bàn

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Số bàn</th>

                    <th>Trạng thái</th>

                    <th>QR Code</th>

                    <th>Thao tác</th>
                    <th>Gọi món</th>
                    <th>Xem đơn</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="table : ${tables}">

                    <td th:text="${table.tableId}"></td>

                    <td th:text="${table.tableNumber}"></td>

                    <td>

    <span class="badge bg-danger"
          th:if="${table.status=='CHUA_THANH_TOAN'}">
        Chưa thanh toán
    </span>

                        <span class="badge bg-success"
                              th:if="${table.status=='DA_THANH_TOAN'}">
        Đã thanh toán
    </span>

                    </td>

                    <td th:text="${table.qrCode}"></td>

                    <td>

                        <a class="btn btn-warning btn-sm"
                           th:href="@{/tables/edit/{id}(id=${table.tableId})}">

                            <i class="fa-solid fa-pen"></i>

                            Sửa

                        </a>

                        <a class="btn btn-danger btn-sm"
                           th:href="@{/tables/delete/{id}(id=${table.tableId})}"
                           onclick="return confirm('Bạn có chắc muốn xóa bàn này không?')">

                            <i class="fa-solid fa-trash"></i>

                            Xóa

                        </a>

                    </td>
                    <td>

                        <a class="btn btn-success"
                           th:href="@{/menu/{id}(id=${table.tableId})}">
                            Gọi món
                        </a>

                    </td>

                    <td>

                        <a class="btn btn-primary"
                           th:href="@{/table-order/{id}(id=${table.tableId})}">
                            Xem đơn
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
