<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết đơn hàng</title>
</head>
<body>

<h2>Thêm / Sửa Chi tiết đơn hàng</h2>

<form th:action="@{/orderdetails/save}"
      th:object="${orderDetail}"
      method="post">

    <input type="hidden"
           th:field="*{orderDetailId}">

    <div>
        <label>Đơn hàng:</label>
        <select th:field="*{orders.orderId}" required>
            <option value="">-- Chọn đơn hàng --</option>

            <option th:each="o : ${orders}"
                    th:value="${o.orderId}"
                    th:text="'Đơn #' + ${o.orderId}">
            </option>
        </select>
    </div>

    <br>

    <div>
        <label>Sản phẩm:</label>
        <select th:field="*{product.productId}" required>
            <option value="">-- Chọn sản phẩm --</option>

            <option th:each="p : ${products}"
                    th:value="${p.productId}"
                    th:text="${p.productName}">
            </option>
        </select>
    </div>

    <br>

    <div>
        <label>Số lượng:</label>
        <input type="number"
               th:field="*{quantity}"
               min="1"
               required>
    </div>

    <br>

    <div>
        <label>Đơn giá:</label>
        <input type="number"
               step="0.01"
               th:field="*{price}"
               min="0"
               required>
    </div>

    <br>

    <div>
        <label>Thành tiền:</label>
        <input type="number"
               step="0.01"
               th:field="*{subtotal}"
               min="0"
               required>
    </div>

    <br>

    <button type="submit">
        Lưu
    </button>

    <a th:href="@{/orderdetails}">
        Hủy
    </a>

</form>

</body>
</html>
