<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thông tin vai trò - Cô Đào Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow border-0">
                <div class="card-header">
                    <h4 class="mb-0 text-dark">
                        <i class="fa-solid fa-user-shield"></i> Thiết lập vai trò
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/roles/save}" th:object="${role}" method="post">
                        <input type="hidden" th:field="*{roleId}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên vai trò</label>
                            <input type="text" th:field="*{roleName}" class="form-control" placeholder="Nhập tên vai trò (ví dụ: ADMIN)..." required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Mô tả chi tiết</label>
                            <input type="text" th:field="*{description}" class="form-control" placeholder="Nhập mô tả quyền hạn...">
                        </div>

                        <hr class="mb-4">

                        <div class="d-flex justify-content-between">
                            <a href="/roles" class="btn btn-secondary">
                                <i class="fa-solid fa-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-floppy-disk"></i> Lưu vai trò
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
