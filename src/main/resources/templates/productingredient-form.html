<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Công thức pha chế - Cô Đào Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow border-0">
                <div class="card-header">
                    <h4 class="mb-0 text-dark">
                        <i class="fa-solid fa-mortar-pestle"></i> Cấu hình công thức pha chế
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/product-ingredients/save}" th:object="${productIngredient}" method="post">
                        <input type="hidden" th:field="*{productIngredientId}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Chọn sản phẩm</label>
                            <select th:field="*{product}" class="form-select" required>
                                <option value="">-- Chọn sản phẩm pha chế --</option>
                                <option th:each="p : ${products}" 
                                        th:value="${p.productId}" 
                                        th:text="${p.productName}">Sản phẩm</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Chọn nguyên liệu tiêu thụ</label>
                            <select th:field="*{ingredient}" class="form-select" required>
                                <option value="">-- Chọn nguyên liệu tiêu hao --</option>
                                <option th:each="i : ${ingredients}" 
                                        th:value="${i.ingredientId}" 
                                        th:text="${i.ingredientName}">Nguyên liệu</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Số lượng tiêu hao (cho 1 phần nước)</label>
                            <input type="number" step="0.01" th:field="*{quantityUsed}" class="form-control" placeholder="Nhập số lượng sử dụng (ví dụ: 0.15)..." required>
                        </div>

                        <hr class="mb-4">

                        <div class="d-flex justify-content-between">
                            <a href="/product-ingredients" class="btn btn-secondary">
                                <i class="fa-solid fa-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-floppy-disk"></i> Lưu công thức
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
