<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đơn hàng bàn - Cô Đào Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container py-5">

    <!-- Error/Warning Messages -->
    <div class="alert alert-warning text-center shadow-sm" th:if="${message != null}" th:text="${message}"></div>

    <div th:if="${order != null}">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a class="btn btn-secondary" th:href="@{/menu/{id}(id=${order.tableCafe.tableId})}">
                <i class="fa-solid fa-arrow-left"></i> Quay lại thực đơn
            </a>
            <h2 class="mb-0">
                <i class="fa-solid fa-file-invoice-dollar text-primary"></i> Đơn hàng Bàn <span th:text="${order.tableCafe.tableNumber}" class="text-primary"></span>
            </h2>
            <div style="width: 120px" class="d-none d-sm-block"></div>
        </div>

        <hr class="mb-4">

        <!-- Items Table Container -->
        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-header">
                Danh sách chi tiết món đặt
            </div>
            <div class="card-body p-0">
                <div class="table-responsive border-0 shadow-none rounded-0">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Tên món</th>
                                <th class="text-center">Số lượng</th>
                                <th class="text-end">Thành tiền</th>
                                <th class="text-center pe-4" style="width: 35%;">Ghi chú đặt món</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="d : ${details}">
                                <td class="ps-4 fw-semibold text-secondary" th:text="${d.product.productName}">Món uống</td>
                                <td class="text-center fw-bold" th:text="${d.quantity}">0</td>
                                <td class="text-end fw-bold text-primary" th:text="${#numbers.formatDecimal(d.subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                                <td class="text-center pe-4">
                                    <!-- Inline update note form -->
                                    <form th:action="@{/update-note/{id}(id=${d.orderDetailId})}" method="post" class="d-flex gap-2 align-items-center justify-content-center">
                                        <input type="text" class="form-control form-control-sm" name="note" th:value="${d.note}" placeholder="Thêm đá, ít đường...">
                                        <button type="submit" class="btn btn-primary btn-sm px-3 py-2">
                                            <i class="fa-solid fa-check"></i> Lưu
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Checkout Total & Summary Actions -->
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center gap-3">
                <div>
                    <span class="text-muted small text-uppercase fw-bold">Tổng cộng thanh toán</span>
                    <h3 class="text-danger fw-bold mb-0 mt-1" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h3>
                </div>
                <div>
                    <a class="btn btn-success btn-lg px-5 py-3 shadow-sm" th:href="@{/table-payment/{id}(id=${order.orderId})}">
                        <i class="fa-solid fa-cash-register"></i> Xác nhận thanh toán tại quầy
                    </a>
                </div>
            </div>
        </div>
        
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
