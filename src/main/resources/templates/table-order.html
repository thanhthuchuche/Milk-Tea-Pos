<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đơn hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <div class="alert alert-warning"
         th:if="${message!=null}"
         th:text="${message}">
    </div>

    <div th:if="${order!=null}">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <a class="btn"
               style="background-color:#8B5E3C; color:white;"
               th:href="@{/menu/{id}(id=${order.tableCafe.tableId})}">

                ← Quay lại menu

            </a>

            <h2 class="mb-0">

                Đơn hàng bàn
                <span th:text="${order.tableCafe.tableNumber}"></span>

            </h2>

            <div style="width:110px;"></div>

        </div>

        <hr>

        <table class="table table-bordered">

            <thead>
            <tr>
                <th>Tên món</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
                <th>Ghi chú</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="d : ${details}">

                <td th:text="${d.product.productName}"></td>

                <td th:text="${d.quantity}"></td>

                <td th:text="${d.subtotal}"></td>

                <td>

                    <form th:action="@{/update-note/{id}(id=${d.orderDetailId})}"
                          method="post">

                        <input type="text"
                               class="form-control"
                               name="note"
                               th:value="${d.note}"
                               placeholder="Nhập ghi chú">

                        <button class="btn btn-primary btn-sm mt-2"
                                style="background-color: #8B5E3C; border-color: #8B5E3C; color: #fff;">
                            Lưu
                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

        <h3 class="text-danger">

            Tổng cộng:

            <span th:text="${order.totalAmount}"></span>

        </h3>

        <div class="mt-4">

            <a class="btn btn-lg"
               style="background-color:#8B5E3C; color:#fff; border-color:#8B5E3C;"
               th:href="@{/table-payment/{id}(id=${order.orderId})}">
                Xác nhận thanh toán
            </a>

        </div>
    </div>

</div>

</body>
</html>
