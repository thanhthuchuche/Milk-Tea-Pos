<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Hóa đơn</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <div class="card">

        <div class="card-header text-white"
             style="background-color:#8B5E3C">

            HÓA ĐƠN THANH TOÁN

        </div>

        <div class="card-body">

            <h5>
                Mã hóa đơn:
                <span th:text="${invoice.invoiceId}"></span>
            </h5>

            <h5>
                Ngày lập:
                <span th:text="${invoice.invoiceDate}"></span>
            </h5>

            <h5>
                Khách hàng:
                <span th:text="${invoice.orders.customer != null ?
                invoice.orders.customer.fullName :
                'Khách lẻ'}">
                </span>
            </h5>
            <h5>
                Bàn:
                <span th:text="${invoice.orders.tableCafe != null ?
                    invoice.orders.tableCafe.tableNumber :
                    'Mang đi'}">
    </span>
            </h5>

            <h5>
                Tổng tiền:
                <span th:text="${invoice.totalAmount}"></span>
            </h5>

            <hr>

            <div class="mt-3">

                <button class="btn"
                        onclick="window.print()"
                        style="background-color:#8B5E3C; color:#fff; border-color:#8B5E3C;">
                    In hóa đơn
                </button>

                <a href="/invoices"
                   class="btn ms-2"
                   style="background-color:#8B5E3C; color:#fff; border-color:#8B5E3C;">
                    Quay lại
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
