<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Thông tin thanh toán</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

</head>

<body style="background-color:#f8f9fa;">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header text-white"
                     style="background-color:#8B5E3C;">

                    <h4 class="mb-0">

                        <i class="fa-solid fa-credit-card"></i>

                        Thông tin thanh toán

                    </h4>

                </div>

                <div class="card-body">

                    <form th:action="@{/payments/save}"
                          th:object="${payment}"
                          method="post">

                        <input type="hidden"
                               th:field="*{paymentId}">

                        <div class="mb-3">

                            <label class="form-label fw-bold">

                                Phương thức thanh toán

                            </label>

                            <input type="text"
                                   th:field="*{paymentMethod}"
                                   class="form-control"
                                   placeholder="Ví dụ: Tiền mặt, Chuyển khoản, Momo">

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">

                                Trạng thái thanh toán

                            </label>

                            <input type="text"
                                   th:field="*{paymentStatus}"
                                   class="form-control"
                                   placeholder="PAID / PENDING">

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">

                                Ngày thanh toán

                            </label>

                            <input type="date"
                                   th:field="*{paymentDate}"
                                   class="form-control">

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-bold">

                                Hóa đơn

                            </label>

                            <select th:field="*{invoice}"
                                    class="form-select">

                                <option value="">
                                    -- Chọn hóa đơn --
                                </option>

                                <option th:each="i : ${invoices}"
                                        th:value="${i.invoiceId}"
                                        th:text="'Hóa đơn #' + ${i.invoiceId} + ' - ' + ${i.totalAmount} + ' VNĐ'">
                                </option>

                            </select>

                        </div>

                        <hr>

                        <div class="d-flex justify-content-between">

                            <a href="/payments"
                               class="btn btn-secondary">

                                <i class="fa-solid fa-arrow-left"></i>

                                Quay lại

                            </a>

                            <button type="submit"
                                    class="btn text-white"
                                    style="background-color:#8B5E3C;">

                                <i class="fa-solid fa-floppy-disk"></i>

                                Lưu thanh toán

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
