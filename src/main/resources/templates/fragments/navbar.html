<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<nav th:fragment="navbar"
     class="navbar navbar-expand-lg navbar-dark">
    <!-- Dynamic Theme Injection -->
    <script>
        if (!document.querySelector('link[href*="style.css"]')) {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = '/css/style.css';
            document.head.appendChild(link);
        }
        if (!document.querySelector('link[href*="font-awesome"]')) {
            const fa = document.createElement('link');
            fa.rel = 'stylesheet';
            fa.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css';
            document.head.appendChild(fa);
        }
    </script>

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/">

            Cô Đào Quán POS

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav">

                <li class="nav-item"
                    sec:authorize="hasAnyRole('ADMIN','STAFF')">

                    <a class="nav-link"
                       href="/">

                        Dashboard

                    </a>

                </li>

                <li class="nav-item"
                    sec:authorize="hasAnyRole('ADMIN','STAFF')">

                    <a class="nav-link"
                       href="/products">

                        Sản phẩm

                    </a>

                </li>
                <li class="nav-item"
                    sec:authorize="hasAnyRole('ADMIN','STAFF')">

                    <a class="nav-link"
                       th:href="@{/ingredients}">
                        Nguyên liệu
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/categories"
                       sec:authorize="hasRole('ADMIN')">

                        Danh mục

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/customers"
                       sec:authorize="hasAnyRole('ADMIN','STAFF')">

                        Khách hàng

                    </a>

                </li>
                <li class="nav-item"
                    sec:authorize="hasRole('CUSTOMER')">

                    <a class="nav-link"
                       th:href="@{/customer/menu}">
                        Đặt món
                    </a>

                </li>

                <li class="nav-item"
                    sec:authorize="hasRole('CUSTOMER')">

                    <a class="nav-link"
                       th:href="@{/customer/orders}">
                        Đơn hàng của tôi
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/users"
                       sec:authorize="hasRole('ADMIN')">

                        Nhân viên

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/orders"
                       sec:authorize="hasAnyRole('ADMIN','STAFF')">

                        Đơn hàng

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/invoices"
                       sec:authorize="hasAnyRole('ADMIN','STAFF')">

                        Hóa đơn

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/payments"
                       sec:authorize="hasAnyRole('ADMIN','STAFF')">

                        Thanh toán

                    </a>

                </li>
                <li class="nav-item">

                    <a class="nav-link"
                       href="/tables"
                       sec:authorize="hasAnyRole('ADMIN','STAFF')">

                        Bàn

                    </a>

                </li>

                <li class="nav-item"
                    sec:authorize="hasRole('ADMIN')">

                    <a class="nav-link"
                       href="/vouchers">

                        Voucher

                    </a>

                </li>

            </ul>

            <!-- User + Logout -->
            <ul class="navbar-nav ms-auto"
                sec:authorize="isAuthenticated()">

                <li class="nav-item"
                    sec:authorize="isAuthenticated()">

    <span class="navbar-text text-white"
          style="position:relative; top:10px;">

        <span sec:authorize="hasRole('ADMIN')"
              style="white-space: nowrap;">
            <i class="fa-solid fa-user"></i>
            Quản&nbsp;lý
        </span>

        <span sec:authorize="hasRole('STAFF')">
            <i class="fa-solid fa-user"></i>
            Nhân viên
        </span>

        <span sec:authorize="hasRole('CUSTOMER')">
            <i class="fa-solid fa-user"></i>
            Khách hàng
        </span>

    </span>

                </li>

                <li class="nav-item">

                    <form th:action="@{/logout}"
                          method="post">

                        <button type="submit"
                                class="btn btn-link nav-link text-white">

                            <i class="fa-solid fa-right-from-bracket"></i>

                            Đăng xuất

                        </button>

                    </form>

                </li>

            </ul>

        </div>

    </div>

</nav>

</body>
</html>
