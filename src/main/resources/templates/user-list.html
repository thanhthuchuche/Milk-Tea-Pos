<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Quản lý nhân viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>
            <i class="fa-solid fa-users"></i>
            Quản lý nhân viên
        </h2>

        <a href="/users/add"
           class="btn btn-success">

            <i class="fa-solid fa-plus"></i>
            Thêm nhân viên

        </a>

    </div>

    <div class="card">

        <div class="card-header bg-primary text-white">

            Danh sách nhân viên

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Tài khoản</th>
                    <th>Họ tên</th>
                    <th>Điện thoại</th>
                    <th>Email</th>
                    <th>Trạng thái</th>
                    <th>Vai trò</th>
                    <th>Thao tác</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="u : ${users}">

                    <td th:text="${u.userId}"></td>

                    <td th:text="${u.username}"></td>

                    <td th:text="${u.fullName}"></td>

                    <td th:text="${u.phone}"></td>

                    <td th:text="${u.email}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:if="${u.status == 'ACTIVE'}">
                            ACTIVE
                        </span>

                        <span class="badge bg-danger"
                              th:if="${u.status == 'INACTIVE'}">
                            INACTIVE
                        </span>

                        <span class="badge bg-secondary"
                              th:if="${u.status != 'ACTIVE' and u.status != 'INACTIVE'}"
                              th:text="${u.status}">
                        </span>

                    </td>

                    <td th:text="${u.role != null ? u.role.roleName : 'Chưa có role'}"></td>

                    <td>

                        <a th:href="@{/users/edit/{id}(id=${u.userId})}"
                           class="btn btn-warning btn-sm">

                            <i class="fa-solid fa-pen"></i>

                        </a>

                        <a th:href="@{/users/delete/{id}(id=${u.userId})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Xóa nhân viên này?')">

                            <i class="fa-solid fa-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
