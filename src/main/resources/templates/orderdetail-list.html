<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết đơn hàng - Cô Đào Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">

    <!-- Header Section -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>
            <i class="fa-solid fa-receipt"></i> Chi tiết các dòng đơn hàng
        </h2>
    </div>

    <!-- Main List Card -->
    <div class="card">
        <div class="card-header">
            Chi tiết lịch sử các sản phẩm được bán ra
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Mã đơn hàng</th>
                            <th>Sản phẩm</th>
                            <th class="text-center">Số lượng</th>
                            <th class="text-end">Đơn giá</th>
                            <th class="text-end">Thành tiền</th>
                            <th class="text-center pe-4" style="width: 12%;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="detail : ${orderDetails}">
                            <td class="ps-4" th:text="${detail.orderDetailId}">1</td>
                            <td class="fw-semibold text-primary" th:text="'Đơn #' + ${detail.orders != null ? detail.orders.orderId : 'N/A'}">#1</td>
                            <td class="fw-semibold text-secondary" th:text="${detail.product != null ? detail.product.productName : 'N/A'}">Trà sữa</td>
                            <td class="text-center fw-bold" th:text="${detail.quantity}">0</td>
                            <td class="text-end text-muted" th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                            <td class="text-end fw-bold text-danger" th:text="${#numbers.formatDecimal(detail.subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                            <td class="text-center pe-4">
                                <a th:href="@{/orderdetails/delete/{id}(id=${detail.orderDetailId})}" 
                                   class="btn btn-danger btn-sm" 
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa chi tiết này không?')">
                                    <i class="fa-solid fa-trash"></i> Xóa
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
